<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes de version — iCowsoft</title>
<style>
  :root {
    --ink:    #1a1a1a;
    --muted:  #5e6b66;
    --line:   #e2e6e3;
    --bg:     #fafaf7;
    --card:   #ffffff;

    /* Couleurs par logiciel (palette Quasar) */
    --sw-icownect:  #1976D2; /* primary */
    --sw-icowdesk:  #37474F; /* blue-grey-8 */
    --sw-icowtrade: #388E3C; /* green-7 */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  header.page {
    padding: 48px 24px 28px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    background: white;
  }
  header.page h1 {
    margin: 0 0 8px;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header.page p { margin: 0; color: var(--muted); font-size: 0.95rem; }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 64px;
    display: grid;
    gap: 24px;
  }

  /* Bloc (logiciel, date) */
  .block {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 4px solid var(--sw, var(--ink));
    border-radius: 12px;
    overflow: hidden;
  }
  .block-head {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(0deg, #fbfdfb, #ffffff);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    color: white;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    background: var(--sw, var(--ink));
    letter-spacing: 0.02em;
  }
  .block-software {
    flex: 1;
    min-width: 0;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--sw, var(--ink));
  }
  .block-date {
    font-size: 0.85rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .block-body { padding: 12px 24px 20px; }

  /* Sous-groupe par domaine fonctionnel */
  .domain-group { margin-top: 16px; }
  .domain-group:first-child { margin-top: 4px; }
  .domain-head {
    margin: 0 0 10px;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    color: var(--muted);
  }

  ul.entries { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
  ul.entries li {
    padding: 12px 14px;
    border-radius: 8px;
    background: #fcfcfa;
    border: 1px solid var(--line);
    display: grid;
    gap: 6px;
  }
  .entry-libelle {
    font-weight: 600;
    font-size: 0.98rem;
    color: var(--ink);
  }
  .entry-desc {
    font-size: 0.92rem;
    color: #3a3a3a;
  }
  .entry-platforms {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }
  /* Chip plateforme (style q-chip) */
  .chip {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 10px;
    border-radius: 999px;
    background: #eef0ee;
    color: #2a3a32;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .chip::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sw, #888);
    margin-right: 6px;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.95rem;
  }
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  @media (max-width: 520px) {
    header.page { padding: 32px 16px 20px; }
    header.page h1 { font-size: 1.5rem; }
    main { padding: 20px 12px 40px; }
    .block-head { padding: 14px 16px; }
    .block-body { padding: 8px 16px 16px; }
  }
</style>
</head>
<body>

<header class="page">
  <h1>
    <img src="./logo.svg" width="80px"/>
    Notes de version
  </h1>
  <p>Évolutions de la plateforme logicielle iCowsoft</p>
</header>

<main id="content">
  <div class="empty">Chargement…</div>
</main>

<footer>Document généré · iCowsoft</footer>

<script>
  const SOFTWARE_META = {
    "iCownect":  { badge: "iCn", color: "var(--sw-icownect)"  },
    "iCowDesk":  { badge: "iCD", color: "var(--sw-icowdesk)"  },
    "iCowTrade": { badge: "iCT", color: "var(--sw-icowtrade)" }
  };

  const $content = document.getElementById("content");

  function formatDate(iso) {
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
  }
  function softwareMeta(name) {
    return SOFTWARE_META[name] || { badge: name.slice(0,3), color: "var(--ink)" };
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }
  function groupBy(arr, keyFn) {
    const m = new Map();
    for (const item of arr) {
      const k = keyFn(item);
      if (!m.has(k)) m.set(k, []);
      m.get(k).push(item);
    }
    return m;
  }
  function asArray(v) {
    if (Array.isArray(v)) return v;
    if (v == null) return [];
    return [v];
  }

  function render(entries) {
    $content.innerHTML = "";

    if (!Array.isArray(entries) || entries.length === 0) {
      $content.innerHTML = `<div class="empty">Aucune entrée à afficher.</div>`;
      return;
    }

    // 1. Expansion : une entrée multi-logiciels devient N entrées (une par logiciel)
    const expanded = [];
    for (const e of entries) {
      for (const sw of asArray(e.software)) {
        expanded.push({ ...e, _software: sw });
      }
    }

    // 2. Regroupement principal : (logiciel, date)
    const blocks = groupBy(expanded, e => `${e._software}|${e.date}`);

    // 3. Tri : date descendante, puis logiciel ascendant
    const sortedKeys = [...blocks.keys()].sort((a, b) => {
      const [sa, da] = a.split("|");
      const [sb, db] = b.split("|");
      if (da !== db) return db.localeCompare(da);
      return sa.localeCompare(sb);
    });

    for (const key of sortedKeys) {
      const [software, date] = key.split("|");
      const items = blocks.get(key);
      const meta = softwareMeta(software);

      const block = document.createElement("article");
      block.className = "block";
      block.style.setProperty("--sw", meta.color);

      // En-tête : badge + logiciel à gauche, date à droite
      const head = document.createElement("div");
      head.className = "block-head";
      head.innerHTML = `
        <div class="badge">${escapeHtml(meta.badge)}</div>
        <div class="block-software">${escapeHtml(software)}</div>
        <div class="block-date">${formatDate(date)}</div>
      `;
      block.appendChild(head);

      // Corps : sous-regroupement par domaine fonctionnel
      const body = document.createElement("div");
      body.className = "block-body";

      const byDomain = groupBy(items, i => i.domain || "—");
      const domains = [...byDomain.keys()].sort((a, b) => a.localeCompare(b, "fr"));

      for (const domain of domains) {
        const group = document.createElement("section");
        group.className = "domain-group";

        const h = document.createElement("h3");
        h.className = "domain-head";
        h.textContent = domain;
        group.appendChild(h);

        const ul = document.createElement("ul");
        ul.className = "entries";

        for (const it of byDomain.get(domain)) {
          const li = document.createElement("li");
          const chips = asArray(it.platform)
            .map(p => `<span class="chip">${escapeHtml(p)}</span>`)
            .join("");
          li.innerHTML = `
            <div class="entry-libelle">${escapeHtml(it.libelle || "")}</div>
            <div class="entry-desc">${escapeHtml(it.description || "")}</div>
            ${chips ? `<div class="entry-platforms">${chips}</div>` : ""}
          `;
          ul.appendChild(li);
        }

        group.appendChild(ul);
        body.appendChild(group);
      }

      block.appendChild(body);
      $content.appendChild(block);
    }
  }

  async function loadFromUrl() {
    try {
      const res = await fetch("releases.json", { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      render(data);
    } catch (err) {
      $content.innerHTML = `
        <div class="empty">
          Impossible de charger <code>releases.json</code>.<br>
          <small>Servir la page via un serveur HTTP (<code>python3 -m http.server</code>).</small>
        </div>`;
    }
  }

  loadFromUrl();
</script>

</body>
</html>
